<div style="justify-content: space-between;height: 100%;" class="flex-column">
  <div style="flex: 1;
  min-height: 0px;
  display: flex;
  flex-direction: column;">
    <div class="underline" style="min-height: 0px;overflow: auto;">

      <app-collapse-container [collapsed]="!copy" sectionName="Copy" (collapsedChange)="handleCollapseChange($event)">
        <div collapse-header class="center-text">
          Copy
        </div>
        <div collapse-body>
          @for (item of copyItems; track item; let l = $last) {
            <app-essential-item [item]="item" [underline]="l">
            </app-essential-item>
          }
        </div>
      </app-collapse-container>
    </div>

    <app-collapse-container [(collapsed)]="copy" class="underline" sectionName="Replication">
      <div collapse-header class="center-text">
        Replication
      </div>
      <div collapse-body>
        @for (item of replicationItems; track item; let l = $last) {
          <app-essential-item [item]="item" [underline]="l">
          </app-essential-item>
        }
      </div>
    </app-collapse-container>
  </div>

  <div collapsed="false" data-cy="current-state">
    <h3 class="underline-title">Current State</h3>
    <div collapse-body>
      @for (item of lastItems; track item; let l = $last) {
        <app-essential-item [item]="item" [underline]="l">
        </app-essential-item>
      }
    </div>
  </div>
</div>
