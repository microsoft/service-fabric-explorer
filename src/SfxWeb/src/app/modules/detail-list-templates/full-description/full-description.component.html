
<div style="margin-left:20px">
  <div style="float: left">
    <app-clip-board [text]="copyText" name="full event description"></app-clip-board>
  </div>
  EventInstanceId: {{item.raw.eventInstanceId}}
  <br>
    Additional Properties:
    <div style="margin-left: 20px;">
      <table>
        @for (item of item.raw.eventProperties | keyvalue; track item) {
          <tr>
            <td class="key-wrapper">{{item.key}}</td> <td class="value-wrapper">: {{item.value}}</td>
          </tr>
        }
      </table>
    </div>
  </div>
