<div style="white-space: nowrap;">
  @if (!cache[item.id]) {
    <span>
      {{displayValue}}
    </span>
  }
  @if (overflow) {
    <span>
      @if (!cache[item.id]) {
        <span class="link" (click)="flipState()">
          ({{value.length - listSetting.maxWidth }}) more
        </span>
      }
      @if (cache[item.id]) {
        <span>
          {{value}}
          <div class="link" (click)="flipState()"> show less</div>
        </span>
      }
    </span>
  }
</div>
