
<div class="flex-center" [ngClass]="wrapperClass">
  @for (phase of progress; track phase; let l = $last) {
    <div class="progress-item hover-row" [ngClass]="cssClass[phase.state]" [attr.data-cy]="cssClass[phase.state] + 'phase'"
      [disableTooltip]="!phase.tooltip" [ngbTooltip]="phase.tooltip" tooltipClass="styled-tooltip" container="body" >
      <div class="text-description" > @if (phase.tooltip) {
        <i class="mif-info link"></i>
        } {{phase.name}}
      </div>
      <div>
        <span style="margin-right: 5px ;">{{phase.textRight}}</span>
        <span [ngClass]="iconMap[phase.state]"></span>
      </div>
    </div>
    <div style="width: fit-content;">
      <ng-container *ngTemplateOutlet="middleItem; context: { data : phase}"></ng-container>
    </div>
    @if (!l) {
      <div class="mif-arrow-right arrow"></div>
    }
  }
</div>
