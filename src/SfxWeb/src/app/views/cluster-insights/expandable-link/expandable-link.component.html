<span 
  [class.expandable-link]="item?.isClickable" 
  [class.non-expandable-link]="!item?.isClickable"
  [style.color]="getColor()"
  (click)="onClick()">
  {{ getDisplayText() }}
  <ng-container *ngIf="item?.icon as icon">
    <img [src]="icon.src" alt="seed node" class="icon" title="Seed Node">
  </ng-container>
  <i *ngIf="item?.showPotentialMitigation" class="mif-info info-icon" [title]="item?.infoMessage"></i>
</span>
