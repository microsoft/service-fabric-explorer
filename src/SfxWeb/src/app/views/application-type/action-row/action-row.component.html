<div class="actions-row">
  @if (item.isArmManaged) {
    <div class="mif-notification mif-2x warning-icon"
      ngbTooltip="This is an ARM managed app type. ARM managed resources should only be modified during ARM deployments."
      tooltipClass="styled-tooltip" container="body"
      >
    </div>
  }
  @for (action of item.actions.collection; track action) {
    <button class="simple-button" [disabled]="action.running"
      (click)="item.actions.runWithTelemetry(action, 'serviceTypesTable')">
      {{ action.displayTitle }}
    </button>
  }
</div>
