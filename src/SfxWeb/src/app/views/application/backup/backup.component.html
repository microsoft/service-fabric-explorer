@if (actions) {
  <div style="height: 50px;">
    <app-action-collection-drop-down [actionCollection]="actions" style="float: right;"
    displayText="Backup Actions"></app-action-collection-drop-down>
  </div>
}

@if (app) {
  <div class="detail-pane essen-pane">
    <h2>Application Backup Configuration</h2>
    <app-detail-list [list]="app.applicationBackupConfigurationInfoCollection.collection" [listSettings]="applicationBackupConfigurationInfoListSettings"></app-detail-list>
  </div>
}
